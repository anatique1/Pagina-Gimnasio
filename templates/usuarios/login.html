{% load socialaccount %}
{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <title>Rehobotbox Gym</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/styleLogin.css' %}">
</head>

<body>
    
    <header>
        <div class="logo">
            <img src="{% static 'img/logo.png' %}">
            <h1 class="gym-logo">REHOBOT BOX</h1>
        </div>
        <a href="{% url 'planes' %}">
            VER PLANES
        </a>
        <a href="{% provider_login_url 'google' prompt='select_account' %}" class="btn-header-google">
                        <span class="g-icon">G</span>
                        INICIAR SESION
        </a>
    </header>
<!-- CONTENIDO -->
    <section class="hero-login">
        <div class="hero-login-overlay"></div>
        <div class="hero-login-content">
            <h2 class="hero-login-title">
                    BIENVENIDOS A <br>
            <h1 class="hero-login-name">REHOBOT BOX</h1>
            
        </div>
    </section>
           

    
<!-- HERO -->
    <section class="hero">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <p class="hero-eyebrow">Únete hoy</p>
            <h1 class="hero-title">
                ENTRENA CON<br>
                <span class="hero-highlight">NOSOTROS</span>
            </h1>
        </div>
    </section>

   

</body>
</html>
